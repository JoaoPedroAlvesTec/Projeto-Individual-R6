<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>R6 | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="css/cadastro.css" />
  <link rel="icon" type="image/x-icon" href="assets/imgs/logo_png.png">
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body onload="listarCpf()">
  

    <div id="containerCentral">
      <div class="card card-cadastro">

        <a href="index.html" class="links">
          <img id="logo" src="assets/imgs/logo_png.png">
        </a>

        <h2>Bem-vindo!</h2>
        <div class="formulario">
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>

          <div class="campo">
            <span>CPF:</span>
            <input id="cpf_input" type="text" placeholder="000.000.000-00" />
          </div>

          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>

          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>

          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>

          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>
</body>

</html>

<script>

    let listaCpfCadastrados = []
  function cadastrar() {

    var nomeVar = nome_input.value;
    var cpfVar = cpf_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    if (
      nomeVar == "" ||
      cpfVar =="" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {

      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Todos campos devem ser preenchidos)";

      return false;
    }
    else {
      setInterval(sumirMensagem, 5000);
    }

    for (let i = 0; i < listaCpfCadastrados.length; i++) {
      if (listaCpfCadastrados[i].cpf == cpfVar) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Cpf já esta em uso)";
        return false;
      }
    }

    if (nomeVar.length<= 3 
    ) {

      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(O nome deve conter mais de 3 letras)";

      return false;
    }
    else {
      setInterval(sumirMensagem, 5000);
    }

    if (cpfVar.length!=11 
    ) {

      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(O cpf deve conter exatamente 11 numeros)";

      return false;
    }
    else {
      setInterval(sumirMensagem, 5000);
    }
    
    if (! (emailVar.includes('@') && emailVar.endsWith('.com'))
    ) {

      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(O email deve conter @ e terminar com .com)";

      return false;
    }
    else {
      setInterval(sumirMensagem, 5000);
    }

    if ( (senhaVar.length <= 7 && confirmacaoSenhaVar.length <= 7 )
    ) {

      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(As senhas devem ter mais de 8 caracteres)";

      return false;
    }
    else {
      setInterval(sumirMensagem, 5000);
    }

    if (senhaVar != confirmacaoSenhaVar
    ) {

      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(As senhas não conhecidem)";

      return false;
    }
    else {
      setInterval(sumirMensagem, 5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
      
        nomeServer: nomeVar,
        cpfServer: cpfVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }


  function listarCpf() {


    fetch("/cpf/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((cpfs) => {
          cpfs.forEach((cpf) => {
            listaCpfCadastrados.push(cpf);

            console.log("listaCpfCadastrados")
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
    }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>

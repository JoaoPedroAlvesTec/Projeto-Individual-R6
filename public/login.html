<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>R6 | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/login.css">
    <link rel="icon" type="image/x-icon" href="assets/imgs/logo_png.png">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>
    <div class="login">
        <div class="container">

            <div class="card card-login">
                <a href="index.html" class="links">
                    <img id="logo" src="assets/imgs/logo_png.png">
                </a>
                <h2>Olá de volta!</h2>
                <div class="formulario">
                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="Login">
                    </div>

                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>

                    <button class="botao" onclick="entrar()">Entrar</button>
                </div>

                <div class="alerta_erro">
                    <div class="card_erro" id="cardErro">
                        <span id="mensagem_erro"></span>
                    </div>

                    <div id="div_erros_login"></div>
                </div>

            </div>
        </div>

        <script>
            function entrar() {
                // aguardar(); // Remova o comentário se a função existir no seu JS

                var emailVar = email_input.value;
                var senhaVar = senha_input.value;

                if (emailVar == "" || senhaVar == "") {
                    cardErro.style.display = "block";
                    mensagem_erro.innerHTML = "Preencha todos os campos!";
                    // finalizarAguardar();
                    return false;
                } else {
                    setInterval(sumirMensagem, 5000);
                }

                fetch("/usuarios/autenticar", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        emailServer: emailVar,
                        senhaServer: senhaVar
                    })
                }).then(function (resposta) {
                    if (resposta.ok) {
                        resposta.json().then(json => {
                            sessionStorage.EMAIL_USUARIO = json.email;
                            sessionStorage.NOME_USUARIO = json.nome;
                            sessionStorage.ID_USUARIO = json.id;

                            setTimeout(function () {
                                window.location = "./dashboard/cards.html";
                            }, 1000);
                        });
                    } else {
                        resposta.text().then(texto => {
                            console.error(texto);
                            cardErro.style.display = "block";
                            mensagem_erro.innerHTML = "Erro ao entrar. Verifique os dados.";
                        });
                    }
                }).catch(function (erro) {
                    console.log(erro);
                });

                return false;
            }

            function sumirMensagem() {
                cardErro.style.display = "none";
            }
        </script>
</body>

</html>
